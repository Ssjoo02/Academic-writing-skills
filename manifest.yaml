name: academic-writing
version: 2.0.0
description: >
  Declarative manifest for the static/dynamic split. SKILL.md uses this to
  decide which fragments to load for a given writing request. The main axes are
  workflow (full-draft or draft-revision), venue_kind, venue, and paper_type. The large
  body of section guides, check references, figure references, domain adapters,
  and style references stays in on-demand references.

always_load:
  # Core stance, gates, and contract — apply to every writing job
  - static/core/stance.md
  - static/core/gates.md
  - static/core/contract.md

axes:
  workflow:
    detect: |
      BLOCKING GATE. Decide the workflow from the user request. Full Draft
      Workflow when the user provides a workspace or asks for a complete first
      paper draft from project materials. Draft Revision Workflow when the user
      provides existing prose and asks to rewrite, polish, diagnose, review,
      compress, weaken claims, or improve flow. If ambiguous, ask one concise
      question and stop.
    values:
      full-draft: static/workflow/full-draft.md
      draft-revision: static/workflow/draft-revision.md
    multi: false

  venue_kind:
    detect: |
      Decide this immediately after workflow routing and before paper_type.
      Allowed values are conference and journal. Select journal only when the
      user explicitly says the target is a journal article or names a journal
      venue/track (for example JMLR, TPAMI, TMLR, IEEE Transactions, ACM
      Transactions, Elsevier/Springer/Wiley journal, or a "journal paper").
      Default to conference otherwise.
      Do not infer journal merely from long length, IMRaD structure, survey
      style, complete experiments, or lack of a named conference. If the target
      is not explicitly journal, route as conference. The venue_kind selects
      the paper_type family: conference values use references/paper-types/*.md;
      journal values use references/paper-types/journal/*.md.
    values:
      conference: references/venues/index.md
      journal: references/venues/journal-vs-conference.md
    default: conference
    multi: false

  venue:
    detect: |
      Decide after venue_kind and before paper_type. For venue_kind=conference,
      select a modeled conference venue when the user explicitly names one;
      otherwise use generic with generic_article.tex and a soft 6-8 main-text-page
      drafting budget. For venue_kind=journal, name the modeled card (jmlr,
      tpami) or fall back to journal (journal-generic) for any journal not
      individually modeled, then verify its fields against the target journal.
      Ask about venue at most once in the whole workflow. Do not ask before
      Writing Policy when merely unspecified; unspecified means conference +
      generic.
    values:
      generic: references/venues/index.md
      # Conferences
      iclr: references/venues/iclr.md
      neurips: references/venues/neurips.md
      icml: references/venues/icml.md
      acl: references/venues/acl.md
      emnlp: references/venues/emnlp.md
      naacl: references/venues/naacl.md
      cvpr: references/venues/cvpr.md
      iccv-eccv: references/venues/iccv-eccv.md
      aaai: references/venues/aaai-ijcai.md
      ijcai: references/venues/aaai-ijcai.md
      kdd: references/venues/kdd-www-sigir.md
      www: references/venues/kdd-www-sigir.md
      sigir: references/venues/kdd-www-sigir.md
      chi-uist: references/venues/chi-uist.md
      # Journals
      jmlr: references/venues/jmlr.md
      tpami: references/venues/ieee-tpami.md
      ieee-tpami: references/venues/ieee-tpami.md
      journal: references/venues/journal-generic.md
    default: generic
    multi: false

  paper_type:
    detect: |
      Decide only after venue_kind and venue. Infer from workspace evidence
      during Writing Policy stage, then select from the family chosen by
      venue_kind. If venue_kind=conference, check references/paper-types/index.md
      and choose one of the conference values. If venue_kind=journal, check
      references/paper-types/journal/index.md and choose one of the journal-*
      values. Use generic for unknown conference papers and journal-generic for
      unknown journal papers. Do not use method or journal-method as a global
      default. Conference and journal paper types are not shared. Domain
      evidence adapters are optional and separate.
    values:
      # Conference paper types (Venue Kind: conference)
      method: references/paper-types/method-paper.md
      benchmark-dataset: references/paper-types/benchmark-dataset-paper.md
      survey: references/paper-types/survey-paper.md
      systems-implementation: references/paper-types/systems-implementation-paper.md
      imrad: references/paper-types/imrad-paper.md
      generic: references/paper-types/generic-paper.md
      # Journal paper types (Venue Kind: journal)
      journal-theory: references/paper-types/journal/theory-paper.md
      journal-method: references/paper-types/journal/method-scaling-paper.md
      journal-systems-tools: references/paper-types/journal/systems-tools-paper.md
      journal-evaluation: references/paper-types/journal/evaluation-benchmark-paper.md
      journal-dataset: references/paper-types/journal/dataset-benchmark-paper.md
      journal-application: references/paper-types/journal/application-paper.md
      journal-survey: references/paper-types/journal/survey-paper.md
      journal-position: references/paper-types/journal/position-governance-paper.md
      journal-generic: references/paper-types/journal/generic-paper.md
    default: generic
    multi: false

references:
  on_demand:
    # Figure references
    - condition: "Paper Framework or full draft needs figure/table planning"
      path: references/figures/figure-planning.md
    - condition: "non-data picture figure (teaser, illustration, conceptual picture)"
      path: references/figures/picture-generation.md
    - condition: "data-driven plots, metric visualizations, or generated tables"
      path: references/figures/plot-style.md
    - condition: "data-driven plots require reusable code patterns (grouped bars, trend lines, heatmaps, radar, save helpers)"
      path: references/figures/chart-patterns.md

    # Section guides (loaded during section drafting)
    - condition: "drafting or revising Abstract"
      path: references/sections/abstract.md
    - condition: "drafting or revising Introduction"
      path: references/sections/introduction.md
    - condition: "drafting or revising Related Work"
      path: references/sections/related-work.md
    - condition: "drafting or revising Method / System"
      path: references/sections/method.md
    - condition: "drafting or revising Experiments / Evaluation"
      path: references/sections/experiments.md
    - condition: "drafting or revising Demo / Application"
      path: references/sections/demo-application.md
    - condition: "drafting or revising Conclusion / Limitations"
      path: references/sections/conclusion.md
    - condition: "paragraph flow diagnosis or section-level revision"
      path: references/sections/paragraph-flow.md
    - condition: "figures or tables are used in a section"
      path: references/sections/figures-and-tables.md
    - condition: "automatic post-draft review immediately after a complete full draft exists and before any draft is delivered to the user"
      path: references/sections/paper-review.md

    # Journal section overlays (Venue Kind: journal). Load the base section guide
    # above first, then layer the matching overlay; the overlay states only the
    # journal-specific deltas and does not replace the base.
    - condition: "Venue Kind is journal AND the journal section overlay mechanism is needed (load before the first overlay)"
      path: references/sections/journal/index.md
    - condition: "Venue Kind is journal AND drafting or revising Abstract (overlay on references/sections/abstract.md)"
      path: references/sections/journal/abstract.md
    - condition: "Venue Kind is journal AND drafting or revising Introduction (overlay on references/sections/introduction.md)"
      path: references/sections/journal/introduction.md
    - condition: "Venue Kind is journal AND drafting or revising Method / System (overlay on references/sections/method.md)"
      path: references/sections/journal/method.md
    - condition: "Venue Kind is journal AND drafting or revising Discussion / Conclusion (overlay on references/sections/conclusion.md)"
      path: references/sections/journal/discussion.md

    # Section examples (loaded only when structure is uncertain or user asks)
    - condition: "Abstract structure is uncertain or user asks for examples"
      path: references/sections/examples/abstract.md
    - condition: "Introduction structure is uncertain or user asks for examples"
      path: references/sections/examples/introduction.md
    - condition: "Method structure is uncertain or user asks for examples"
      path: references/sections/examples/method.md

    # Check references (loaded when risks are unresolved)
    - condition: "Writing Policy stage workspace logic/evidence audit (trace-to-artifact, cross-file consistency, result-to-conclusion logic, scope/integrity smells, independent recheck)"
      path: references/checks/workspace-logic-audit.md
    - condition: "claim-evidence audit or high-risk central claim"
      path: references/checks/claim-evidence.md
    - condition: "citation integrity check needed"
      path: references/checks/citation-integrity.md
    - condition: "metric design audit for experiments"
      path: references/checks/metric-design.md
    - condition: "reviewer-risk audit before submission"
      path: references/checks/reviewer-risk.md
    - condition: "final full-paper review, writing quality audit, or user asks to check writing craft"
      path: references/checks/writing-craft.md
    - condition: "final submission-readiness check after a full paper draft exists"
      path: references/checks/submission-readiness.md
    - condition: "Venue Kind is journal: plan mandatory statements, display-item caps/tiers, methods placement, and word/length budget early, and re-check before submission-ready"
      path: references/checks/journal-submission-elements.md

    # Style references
    - condition: "drafting or polishing English prose (sentence/paragraph/abstract/section): apply the copyediting and language standard while writing, and verify its mechanical subset in final review"
      path: references/style/copyediting-standard.md

    # Principles
    - condition: "Writing Policy generation"
      path: references/principles/research-strategy.md

    # Journal drafting posture (load when the confirmed venue is a journal)
    - condition: "confirmed venue is a journal (Venue Kind: journal); journal vs conference drafting posture, length, blinding, revision cycle, supplementary, extension"
      path: references/venues/journal-vs-conference.md
    - condition: "journal paper-type selection when Venue Kind is journal"
      path: references/paper-types/journal/index.md

    # Templates
    - condition: "template selection for LaTeX project"
      path: templates/index.md
