name: academic-figure
version: 3.0.0
description: >
  Declarative manifest for the academic-figure skill. SKILL.md uses this to load
  the figure/table execution fragments and the deep references on demand. Cross-skill
  stance/integrity lives at ../../_shared/core. Part of the academic-writing collection.

always_load:
  - ../../_shared/core/stance.md

axes:
  display_item:
    detect: |
      Decide which execution fragment to load from the request. plot for any
      data-driven chart; schematic for deterministic pipeline/framework/
      architecture/workflow/taxonomy diagrams; picture for teaser/concept/
      raster illustration or qualitative composite; table for any LaTeX table.
      A request with multiple display items loads each matching fragment.
    values:
      plot: workflows/plot.md
      schematic: workflows/schematic.md
      picture: workflows/picture.md
      table: workflows/table.md
    multi: true

  venue_kind:
    detect: |
      Conference or journal. Selects the sizing reference and, for journal, the
      figure-contract. Default to conference unless the caller explicitly says journal.
    values:
      conference: references/figures/conference/figure-sizing.md
      journal: references/figures/journal/figure-sizing.md
    default: conference
    multi: false

references:
  on_demand:
    - condition: "data-driven plots — venue-agnostic shared rules (rcParams, colors, per-chart-type rules, legend rules, multi-panel architecture); load before the venue-specific sizing file"
      path: references/figures/plot-style.md
    - condition: "data-driven plots need chart-family selection, palette presets, label strategy, statistics contract, or coverage for bar/grouped/stacked/line/scatter/Pareto/radar/heatmap/distribution/pie/donut patterns"
      path: references/figures/chart-taxonomy.md
    - condition: "deterministic schematic diagrams — pipeline, framework, architecture, workflow, taxonomy, benchmark construction, system overview"
      path: references/figures/schematic-design.md
    - condition: "picture-style figure — teaser, conceptual method illustration, raster overview, qualitative composite, or image-model-generated picture"
      path: references/figures/picture-generation.md
    - condition: "data-driven plots require reusable code patterns (grouped bars, trend lines, heatmaps, radar, save helpers)"
      path: references/figures/chart-patterns.md
    - condition: "user supplies a style reference, reference figure, PDF, screenshot, or style example; extract visual grammar only and do not import research content"
      path: references/figures/style-reference.md
    - condition: "figure planning, Display Item Contract, Display Review Gate, failure signatures, generation routes"
      path: references/figures/figure-planning.md
    - condition: "Venue Kind is conference AND data-driven plots need column widths, figsize, font hierarchy, height budget"
      path: references/figures/conference/figure-sizing.md
    - condition: "Venue Kind is journal AND data-driven plots need column widths, figsize, font hierarchy, height budget, display-item caps, export formats"
      path: references/figures/journal/figure-sizing.md
    - condition: "Venue Kind is journal AND figure planning needs journal-specific composition patterns, panel logic, aesthetic integration, reviewer-risk checklist"
      path: references/figures/journal/figure-contract.md
    - condition: "all figures have passed individual review gates AND submission-readiness cross-figure check is needed (statistics minimum, image-integrity, export bundle)"
      path: references/figures/qa-contract.md
    - condition: "table span decisions, LaTeX patterns, or table QA gate is needed"
      path: references/tables/table-design.md
    - condition: "table body-vs-appendix decision, span/width contract, overflow ladder, appendix float discipline, or supplement routing is needed"
      path: references/tables/table-placement.md
    - condition: "how figures and tables sit in the prose and captions"
      path: references/prose/display-in-prose.md

scripts:
  - condition: "data-backed LaTeX table tasks need schema inspection before table classification or width decisions"
    path: scripts/inspect_table_data.py
  - condition: "picture-style figures have a Picture Brief and a Gemini/OpenAI-compatible image API should render the Direct Image Prompt"
    path: scripts/render_picture_api.py
